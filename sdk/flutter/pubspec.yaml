name: protocol_orzatty
description: >
  Protocol Orzatty (PO) Flutter plugin — P2P End-to-End Encrypted
  networking over QUIC. Native FFI bindings to the Rust core.
version: 0.5.1
homepage: https://orzatty.com
repository: https://github.com/orzattyholding/po

environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: '>=3.0.0'

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  ffigen: ^8.0.0
